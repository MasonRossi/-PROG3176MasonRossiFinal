name: Build and deploy ASP.Net Core app to Azure Web App - MasonRossiEventsService

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore ./EventService/EventService.csproj

      - name: Build
        run: dotnet build ./EventService/EventService.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ./EventService/EventService.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ACB806D676BE47BFA89F08EA0F2C7835 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A18AEE48B1946F6A2FACEA2A6EDF252 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4A2FA8C9FBAA4A16954F4559ED967376 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: MasonRossiEventsService
          package: ./publish